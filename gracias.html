<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gracias | Casa Raiz RD</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--green:#0B7A4B;--green-2:#0f9a62;--dark:#10231b;--muted:#65756f;--border:#dbe9e2}
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;display:grid;place-items:center;
      font-family:'Inter',Arial,sans-serif;
      background:linear-gradient(135deg,#f7fbf8 0%,#eef8f2 100%);
      color:var(--dark);padding:24px;
    }
    .card{
      max-width:680px;width:100%;background:#fff;border:1px solid var(--border);
      border-radius:30px;padding:42px;text-align:center;
      box-shadow:0 24px 70px rgba(20,54,38,.12);
    }
    .icon{
      width:74px;height:74px;border-radius:24px;margin:0 auto 20px;
      background:linear-gradient(135deg,var(--green),var(--green-2));
      color:#fff;display:grid;place-items:center;font-size:36px;font-weight:800;
    }
    h1{font-size:clamp(30px,5vw,44px);line-height:1.08;margin:0 0 14px;letter-spacing:-1px}
    p{font-size:18px;line-height:1.65;color:var(--muted);margin:0 0 24px}
    .actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
    .btn{
      display:inline-block;border-radius:16px;padding:16px 20px;
      font-weight:800;text-decoration:none;
    }
    .primary{background:linear-gradient(135deg,var(--green),var(--green-2));color:#fff;box-shadow:0 14px 28px rgba(11,122,75,.24)}
    .secondary{background:#eaf6ef;color:var(--green);border:1px solid #cfe8d8}
    .note{font-size:13px;margin-top:22px;color:#7a8983}
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">✓</div>
    <h1>¡Gracias! Tu guía está lista</h1>
    <p>
      Descarga ahora la guía gratuita. También puedes escribirnos por WhatsApp
      para recibir asesoría personalizada sobre opciones de apartamentos en RD.
    </p>

    <div class="actions">
      <a class="btn primary" href="guia-comprar-apartamento-rd-2026.pdf" download>Descargar guía PDF</a>
      <a class="btn secondary" href="https://wa.me/18292786677?text=Hola%2C%20descargu%C3%A9%20la%20gu%C3%ADa%20y%20quiero%20asesor%C3%ADa%20para%20comprar%20un%20apartamento" target="_blank" rel="noopener">Hablar por WhatsApp</a>
    </div>

    <div class="note">Casa Raiz RD · Asesoría inmobiliaria</div>
  </main>
</body>
</html>
