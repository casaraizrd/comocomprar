<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Gracias | Casa Raiz RD</title>
  <meta name="robots" content="noindex,nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family:Inter,Arial,sans-serif;
      background:linear-gradient(135deg,#f7fbf8 0%,#eef8f2 100%);
      color:#10231b;
      padding:22px;
    }

    .card{
      width:min(700px,100%);
      background:#fff;
      border:1px solid #dbe9e2;
      border-radius:30px;
      padding:42px;
      text-align:center;
      box-shadow:0 28px 75px rgba(20,54,38,.14);
    }

    .icon{
      width:76px;
      height:76px;
      border-radius:24px;
      margin:0 auto 20px;
      background:linear-gradient(135deg,#0B7A4B,#12a367);
      color:white;
      display:grid;
      place-items:center;
      font-size:38px;
      font-weight:900;
    }

    h1{
      font-size:clamp(34px,5vw,48px);
      margin:0 0 14px;
      letter-spacing:-1px;
    }

    p{
      font-size:18px;
      line-height:1.65;
      color:#64756e;
      margin:0 0 24px;
    }

    .actions{
      display:flex;
      justify-content:center;
      gap:14px;
      flex-wrap:wrap;
    }

    a{
      display:inline-block;
      padding:17px 22px;
      border-radius:17px;
      text-decoration:none;
      font-weight:900;
    }

    .primary{
      background:linear-gradient(135deg,#0B7A4B,#12a367);
      color:white;
      box-shadow:0 16px 30px rgba(11,122,75,.24);
    }

    .secondary{
      background:#e8f6ef;
      color:#0B7A4B;
      border:1px solid #cfe8d8;
    }
  </style>
</head>

<body>

<main class="card">
  <div class="icon">✓</div>

  <h1>¡Gracias! Tu guía está lista</h1>

  <p>
    Descarga ahora la guía gratuita. También puedes escribirnos por WhatsApp
    para recibir asesoría personalizada.
  </p>

  <div class="actions">
    <a class="primary" href="guia-comprar-apartamento-rd-2026.pdf" download>
      Descargar guía PDF
    </a>

    <a class="secondary" href="https://wa.me/18292786677?text=Hola%2C%20descargu%C3%A9%20la%20gu%C3%ADa%20y%20quiero%20asesor%C3%ADa" target="_blank">
      Hablar por WhatsApp
    </a>
  </div>
</main>

</body>
</html>
